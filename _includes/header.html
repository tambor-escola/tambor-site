<header class="site-header">
  <div class="studio-container">
    <a class="site-title" rel="author" href="{{ '/' | relative_url }}">
  <img src="{{ '/assets/images/Tambor_logo.svg' | relative_url }}" alt="{{ site.title | escape }}" class="site-logo">
</a>

    <nav class="site-nav">
      <input type="checkbox" id="nav-trigger" />
      <label for="nav-trigger">
  <span class="menu-icon"></span>
</label>
      <div class="nav-items">
      {%- for link in site.nav_links -%}
      {%- if link.external -%}
      <a class="nav-item" href="{{ link.url }}" target="_blank">{{ link.title }} &#8599;</a>
      {%- else -%}
      <a 
  class="nav-item {% if page.url == link.url %}is-active{% endif %}" 
  href="{{ link.url | relative_url }}">
  {{ link.title }}
</a>
      {%- endif -%}
      {%- endfor -%}
      </div>
    </nav>
  </div>
</header>
